<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title id="page-title">Loading...</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Font loaded from brand-config (injected dynamically) -->
  <link id="brand-font-link" rel="stylesheet" href="">

  <style>
    /* ============================================================
       ECHO LP v2.3 - GLOBAL RESET & BASE
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: var(--brand-font, 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
      background: #0a0a0a;
      color: #ffffff;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ============================================================
       CSS VARIABLES - Populated from brand-config
    ============================================================ */
    :root {
      --brand-font: 'Inter', system-ui, sans-serif;
      --btn-color: #2563eb;
      --btn-text: #ffffff;
      --overlay-opacity: 0.65;
      --hero-img: url('');
    }

    /* ============================================================
       BACKGROUND HERO IMAGE
    ============================================================ */
    #hero-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
      transition: opacity 0.5s ease;
    }

    #hero-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, var(--overlay-opacity));
      z-index: 1;
    }

    /* ============================================================
       MAIN LAYOUT
    ============================================================ */
    #page-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 20px;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      text-align: center;
    }

    /* ============================================================
       SCARCITY BAR
    ============================================================ */
    #scarcity {
      display: none;
      background: rgba(15,15,15,0.92);
      border-top: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 10px 20px;
      text-align: center;
      width: 100%;
      position: fixed;
      bottom: 0; left: 0;
      z-index: 1000;
    }

    #scarcity.active {
      display: block;
    }

    @keyframes scarcityPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    /* ============================================================
       PROGRESS INDICATOR
    ============================================================ */
    #progress-indicator {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    #progress-indicator.active {
      display: flex;
    }

    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }

    .progress-dot.current {
      background: var(--btn-color);
      width: 10px;
      height: 10px;
      box-shadow: 0 0 8px var(--btn-color);
    }

    .progress-dot.done {
      background: rgba(255,255,255,0.6);
    }

    /* ============================================================
       HEADLINE & SUBHEADLINE
    ============================================================ */
    #headline {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 900;
      line-height: 1.12;
      color: #ffffff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    #subheadline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 400;
      line-height: 1.6;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 10px rgba(0,0,0,0.4);
      margin-bottom: 36px;
      max-width: 640px;
    }

    /* ============================================================
       MICRO-YES CHECKBOX (Commitment Trigger)
    ============================================================ */
    #micro-yes-container {
      display: none;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      cursor: pointer;
      max-width: 560px;
      text-align: left;
      transition: background 0.2s;
    }

    #micro-yes-container.active {
      display: flex;
    }

    #micro-yes-container:hover {
      background: rgba(255,255,255,0.12);
    }

    #micro-yes-checkbox {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.5);
      background: transparent;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      transition: all 0.2s;
      margin-top: 1px;
    }

    #micro-yes-checkbox:checked {
      background: var(--btn-color);
      border-color: var(--btn-color);
    }

    #micro-yes-checkbox:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    #micro-yes-label {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
      cursor: pointer;
    }

    /* ============================================================
       CTA BUTTON
    ============================================================ */
    #cta-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    #cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--btn-color);
      color: var(--btn-text, #ffffff);
      text-decoration: none;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      font-family: inherit;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 0 0 var(--btn-color);
      animation: ctaPulse 3s ease-in-out infinite;
    }

    /* Button sizes */
    #cta-button.size-small   { padding: 12px 28px; font-size: 0.95rem; border-radius: 8px; }
    #cta-button.size-medium  { padding: 16px 36px; font-size: 1.05rem; border-radius: 10px; }
    #cta-button.size-large   { padding: 20px 44px; font-size: 1.15rem; border-radius: 12px; }
    #cta-button.size-xlarge  { padding: 22px 52px; font-size: 1.25rem; border-radius: 14px; }

    /* Button styles */
    #cta-button.style-square  { border-radius: 4px !important; }
    #cta-button.style-rounded { /* default */ }
    #cta-button.style-pill    { border-radius: 100px !important; }
    #cta-button.style-subtle  { box-shadow: none; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.6); }

    #cta-button:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 0 6px rgba(255,255,255,0.08);
      filter: brightness(1.1);
    }

    #cta-button:active {
      transform: translateY(0) scale(0.99);
    }

    #cta-button.dimmed {
      opacity: 0.45;
      pointer-events: none;
      animation: none;
    }

    #cta-button .btn-arrow {
      font-size: 1.2em;
      transition: transform 0.2s;
    }

    #cta-button:hover .btn-arrow {
      transform: translateX(4px);
    }

    @keyframes ctaPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 0 0 var(--btn-color); }
      50% { box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 0 8px rgba(37,99,235,0); }
    }

    /* Button shimmer effect */
    #cta-button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }

    #cta-button:hover::before {
      left: 100%;
    }

    /* ============================================================
       LEGAL CONSENT TEXT
    ============================================================ */
    #legal-consent {
      font-size: 9px;
      color: rgba(255,255,255,0.40);
      line-height: 1.5;
      max-width: 480px;
      text-align: center;
      margin-top: 4px;
    }

    #legal-consent a {
      color: inherit;
      text-decoration: underline;
    }

    /* ============================================================
       SOCIAL PROOF POPUP
    ============================================================ */
    #social-proof {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 20px;
      background: rgba(20,20,20,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 14px 18px;
      max-width: 300px;
      z-index: 900;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slideInSP 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    #social-proof.active {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    @keyframes slideInSP {
      from { transform: translateX(-120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .sp-avatar {
      width: 44px;
      height: 44px;
      min-width: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--btn-color), #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .sp-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sp-name {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    .sp-text {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      line-height: 1.4;
    }

    .sp-time {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    #page-footer {
      position: relative;
      z-index: 2;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 24px 20px;
      text-align: center;
    }

    #footer-inner {
      max-width: 860px;
      margin: 0 auto;
    }

    #footer-logo-wrap {
      margin-bottom: 16px;
    }

    #footer-logo-wrap img {
      height: 40px;
      width: auto;
      object-fit: contain;
      opacity: 0.85;
    }

    #footer-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .social-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .social-icon:hover {
      color: rgba(255,255,255,1);
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    .social-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    #footer-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    #footer-links a {
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-size: 11px;
      transition: color 0.2s;
    }

    #footer-links a:hover {
      color: rgba(255,255,255,0.8);
    }

    #footer-links .sep {
      color: rgba(255,255,255,0.2);
      font-size: 11px;
    }

    #footer-copyright {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }

    /* ============================================================
       DEBUG PANEL
    ============================================================ */
    #debug-panel {
      display: none;
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.92);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 16px;
      font-size: 11px;
      color: #4ade80;
      font-family: 'Courier New', monospace;
      z-index: 9999;
      max-width: 320px;
      max-height: 500px;
      overflow-y: auto;
      line-height: 1.6;
    }

    #debug-panel.active {
      display: block;
    }

    #debug-panel .debug-title {
      color: #facc15;
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 6px;
    }

    #debug-aps {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,200,0,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      color: #facc15;
      font-family: monospace;
      z-index: 9998;
    }

    #debug-aps.active {
      display: block;
    }

    /* ============================================================
       MOBILE RESPONSIVE
    ============================================================ */
    @media (max-width: 640px) {
      #main-content {
        padding: 60px 16px 20px;
        justify-content: flex-start;
        padding-top: 80px;
      }

      #headline {
        font-size: 1.9rem;
      }

      #subheadline {
        font-size: 1rem;
      }

      #cta-button.size-xlarge {
        padding: 20px 36px;
        font-size: 1.1rem;
        width: 100%;
        max-width: 400px;
      }

      #social-proof {
        bottom: 70px;
        left: 12px;
        right: 12px;
        max-width: none;
      }

      #footer-social {
        gap: 10px;
      }
    }

    @media (max-width: 380px) {
      #headline {
        font-size: 1.6rem;
      }

      #cta-button.size-xlarge {
        padding: 18px 28px;
        font-size: 1rem;
      }
    }

    /* Scarcity bar at bottom — pad content so it clears bar */
    body.has-scarcity #main-content {
      padding-bottom: 44px;
    }

    /* Loading state */
    body.loading #main-content {
      opacity: 0;
    }

    body.ready #main-content {
      opacity: 1;
      transition: opacity 0.4s ease;
    }
  </style>
</head>

  <!-- DEBUG PANEL -->

  <!-- ============================================================
       ECHO LP v2.3 — CORE JAVASCRIPT
  ============================================================ -->
  <script>
  (function() {
    'use strict';

    /* ===========================================================
       1. UTILITY: COOKIES
       cookieCfg defaults — overridden from brand-config in initPage()
    =========================================================== */
    var cookieExpiryDays = 365;
    var cookieCfg = { sameSite: 'Lax', secure: true, domain: 'auto' };

    function setCookie(name, value, days) {
      if (value === null || value === undefined || value === '') return;
      days = days || cookieExpiryDays;
      var expires = new Date();
      expires.setTime(expires.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = name + '=' + encodeURIComponent(String(value))
        + '; expires=' + expires.toUTCString()
        + '; path=/; SameSite=' + (cookieCfg.sameSite || 'Lax');
    }

    function getCookie(name) {
      var nameEQ = name + '=';
      var ca = document.cookie.split(';');
      for (var i = 0; i < ca.length; i++) {
        var c = ca[i].trim();
        if (c.indexOf(nameEQ) === 0) {
          return decodeURIComponent(c.substring(nameEQ.length));
        }
      }
      return '';
    }

    /* ===========================================================
       2. UTILITY: URL PARAMS
    =========================================================== */
    var urlParams = (function() {
      var params = {};
      var search = window.location.search.substring(1);
      var pairs = search.split('&');
      for (var i = 0; i < pairs.length; i++) {
        var pair = pairs[i].split('=');
        if (pair[0]) {
          params[decodeURIComponent(pair[0])] = pair[1]
            ? decodeURIComponent(pair[1].replace(/\+/g, ' '))
            : '';
        }
      }
      return params;
    })();

    function getParam(primaryName, aliases) {
      if (urlParams[primaryName]) return urlParams[primaryName];
      if (aliases) {
        for (var i = 0; i < aliases.length; i++) {
          if (urlParams[aliases[i]]) return urlParams[aliases[i]];
        }
      }
      var cookieVal = getCookie(primaryName);
      if (cookieVal) return cookieVal;
      return '';
    }

    /* ===========================================================
       3. CONFIG LOADER
    =========================================================== */
    var brandConfig = {};

    function deepGet(obj, path, fallback) {
      try {
        return path.reduce(function(o, k) { return o[k]; }, obj) || fallback;
      } catch(e) {
        return fallback;
      }
    }

    /* ===========================================================
       4. PARAMETER COLLECTION - ALL 350+ PARAMS
    =========================================================== */

    // CATEGORY 1: AdKernel Core
    var conversion = getParam('conversion', ['trck', 'click_id', 'cid']);
    var campaign   = getParam('campaign',   ['campaign_id']);
    var banner     = getParam('banner',     ['creative_id', 'banner_id']);
    var publisher  = getParam('publisher',  ['publisher_id']);
    var offer      = getParam('offer',      ['offer_id']);
    var goal_id    = getParam('goal_id',    []);

    // CATEGORY 2: AdKernel Native
    var pubzone          = getParam('pubzone', []);
    var country_name     = getParam('country_name', []);
    var region           = getParam('region', []);
    var city             = getParam('city', []);
    var device_type      = getParam('device_type', []);
    var os               = getParam('os', []);
    var browser_param    = getParam('browser', []);
    var Keyword          = getParam('Keyword', ['keyword']);
    var bid              = getParam('bid', []);
    var date_param       = getParam('date', []);
    var day_of_month     = getParam('day_of_month', []);
    var day_of_week      = getParam('day_of_week', []);
    var device_brand     = getParam('device_brand', []);
    var device_model     = getParam('device_model', []);
    var request_id       = getParam('request_id', []);
    var month_param      = getParam('month', []);
    var original_subid   = getParam('original_subid', []);
    var os_type          = getParam('os_type', []);
    var postback_id      = getParam('postback_id', []);
    var app_bundle       = getParam('app_bundle', []);
    var app_id           = getParam('app_id', []);
    var pubfeed          = getParam('pubfeed', []);
    var subid            = getParam('subid', []);
    var payout           = getParam('payout', []);
    var pubpoint         = getParam('pubpoint', []);
    var Query            = getParam('Query', ['query']);
    var site_id          = getParam('site_id', []);

    function calculateAPS() {
      var total = apsData.base
        + Math.min(apsData.timeBonus, apsCfg.max_time_bonus)
        + Math.min(apsData.mouseBonus, apsCfg.max_mouse_bonus)
        + Math.min(apsData.hoverBonus, apsCfg.max_hover_bonus)
        + apsData.scrollBonus
        + apsData.ctaClickBonus
        + apsData.emailBonus
        + apsData.phoneBonus
        + Math.min(apsData.surveyBonus, apsCfg.max_survey_bonus);
      return Math.min(Math.round(total), 100);
    }

        apsData.timeBonus += apsCfg.threshold_bonus;

      if (score >= high)    return 'high';
      if (score >= medHigh) return 'med_high';

      var finalHl = hl || deepGet(brandConfig, ['landing_page', 'defaults', 'headline'],
        'Transform Your Business Today');
      var finalSh = sh || deepGet(brandConfig, ['landing_page', 'defaults', 'subheadline'],
        'Join thousands of entrepreneurs who\'ve unlocked consistent, scalable growth');

      document.getElementById('headline').textContent = finalHl;
      document.getElementById('subheadline').textContent = finalSh;
      document.title = deepGet(brandConfig, ['brand', 'name'], 'AmplifAI') + ' — Step 1';

      // ── 11g. CTA BUTTON ──────────────────────────────────────
      var finalCtaText  = cta      || deepGet(brandConfig, ['landing_page', 'defaults', 'cta_text'], 'Get Started Now');
      var finalBtnColor = btn_color || deepGet(brandConfig, ['landing_page', 'styling', 'button_color'], '#2563eb');
      var finalBtnSize  = btn_size  || deepGet(brandConfig, ['landing_page', 'styling', 'button_size'], 'xlarge');
      var finalBtnStyle = btn_style || deepGet(brandConfig, ['landing_page', 'styling', 'button_style'], 'rounded');

      document.documentElement.style.setProperty('--btn-color', finalBtnColor);
      document.getElementById('cta-text').textContent = finalCtaText;

      var ctaEl = document.getElementById('cta-button');
      ctaEl.className = 'size-' + finalBtnSize + ' style-' + finalBtnStyle;
      ctaEl.href   = 'conversion-tracker.html' + window.location.search;
      ctaEl.target = '_blank';
      ctaEl.rel    = 'noopener';

      // ── CTA DESTINATION ROUTING ──────────────────────────────
      function buildDestUrl(dest) {
        var params = [];
        for (var k in allParams) {
          if (allParams.hasOwnProperty(k) && allParams[k]) {
            var alreadyInDest = dest.indexOf(encodeURIComponent(k) + '=') !== -1
              || dest.indexOf(k + '=') !== -1;
            if (!alreadyInDest) {
              params.push(encodeURIComponent(k) + '=' + encodeURIComponent(allParams[k]));
            }
          }
        }
        if (!params.length) return dest;
        var sep = dest.indexOf('?') !== -1 ? '&' : '?';
        return dest + sep + params.join('&');
      }

      if (link) {
        ctaEl.href = buildDestUrl(link);
      } else if (debug === '1' && ux !== 'y') {
        ctaEl.href = 'conversion-tracker.html' + window.location.search;
      } else {
        var cfgDest = deepGet(brandConfig, ['landing_page', 'defaults', 'cta_destination'], '');
        if (cfgDest) { try { cfgDest = decodeURIComponent(cfgDest); } catch(e) {} }
        ctaEl.href = cfgDest ? buildDestUrl(cfgDest) : ('conversion-tracker.html' + window.location.search);
      }

      // ── 11h. SCARCITY ────────────────────────────────────────
      var scarcityEnabled = scarcity ||
        (deepGet(brandConfig, ['landing_page', 'features', 'scarcity', 'enabled'], false) ? '3' : '');
      if (scarcityEnabled) {
        var spots = parseInt(scarcityEnabled) ||
          deepGet(brandConfig, ['landing_page', 'features', 'scarcity', 'default_spots'], 3);
        var scarcityMsg = (scarcity_text ||
          deepGet(brandConfig, ['landing_page', 'features', 'scarcity', 'default_text'],

        var scarcityEl = document.getElementById('scarcity');
        scarcityEl.textContent = '⚡ ' + scarcityMsg;
        scarcityEl.classList.add('active');
        document.body.classList.add('has-scarcity');
      }

      // ── 11i. SOCIAL PROOF POPUP ──────────────────────────────
      var spEnabled = social_proof_param === 'on' ||
        deepGet(brandConfig, ['landing_page', 'features', 'social_proof', 'enabled'], false);

      if (spEnabled) {
        var spVariants = deepGet(brandConfig, ['landing_page', 'features', 'social_proof', 'variants'], []);
        if (!spVariants.length) {
          spVariants = [
            { emoji: '👩‍💼', name: 'Sarah M.', text: 'Just registered from New York', time: '2 minutes ago' },
            { emoji: '👨‍💻', name: 'James K.',  text: 'Joined from Los Angeles',       time: '5 minutes ago' },
            { emoji: '👩‍🎓', name: 'Maria R.', text: 'Signed up from Chicago',         time: '8 minutes ago' },
            { emoji: '🧑‍🚀', name: 'David T.', text: 'Just booked a session',          time: '12 minutes ago' },
            { emoji: '👩‍🔬', name: 'Lisa P.',  text: 'Applied from Miami',             time: '3 minutes ago' },
            { emoji: '🧑‍💼', name: 'Alex W.',  text: 'Getting started now',            time: '7 minutes ago' }
          ];
        }

        var customText = social_text ||
          deepGet(brandConfig, ['landing_page', 'features', 'social_proof', 'default_text'], '');

        function showSocialProof() {
          var variant = spVariants[Math.floor(Math.random() * spVariants.length)];
          var spEl = document.getElementById('social-proof');
          document.getElementById('sp-avatar').textContent = variant.emoji;
          document.getElementById('sp-name').textContent = variant.name;
          document.getElementById('sp-text').textContent = customText || variant.text;
          document.getElementById('sp-time').textContent = variant.time;
          spEl.classList.add('active');
          spEl.style.animation = 'none';
          spEl.offsetHeight;
          spEl.style.animation = '';
          setTimeout(function() { spEl.classList.remove('active'); }, 5000);
        }

        setTimeout(function() {
          showSocialProof();
          setInterval(showSocialProof, 20000);
        }, 8000);
      }

      // ── 11j. MICRO-YES CHECKBOX ──────────────────────────────
      var microYesEnabled = micro_yes === 'on' ||
        deepGet(brandConfig, ['landing_page', 'features', 'micro_yes', 'enabled'], false);

      if (microYesEnabled) {

        var ctaBtnMicro = document.getElementById('cta-button');

        document.getElementById('micro-yes-checkbox').addEventListener('change', function() {

        document.getElementById('legal-consent').innerHTML = legalText;

      // ── 11m. FOOTER ──────────────────────────────────────────
      buildFooter(brandConfig);

      // ── 11n. DEBUG PANEL ─────────────────────────────────────
      if (debug === '1') {
        document.getElementById('debug-panel').classList.add('active');
        document.getElementById('debug-aps').classList.add('active');
        document.getElementById('debug-eps-value').textContent = eps_score || '0';

        var debugLines = [

          'Phase: '      + (phase      || '(none)'),

      // ── 11o. READY STATE ─────────────────────────────────────

      // ── 11p. GTM EVENTS ──────────────────────────────────────
      firePageViewEvents();
    }

    /* ===========================================================
       13. GTM EVENTS - PAGE VIEW (Step 0)
    =========================================================== */
    function firePageViewEvents() {

      var baseData = buildFullDataLayer();

      // EVENT 1: echo_lp_view — step_0
      window.dataLayer.push(Object.assign({}, baseData, {
        event: 'echo_lp_view',
        funnel_step: 'step_0',
        headline: document.getElementById('headline').textContent,
        subheadline: document.getElementById('subheadline').textContent
      }));

      if (debug === '1') console.log('[Echo LP] 📊 echo_lp_view fired (step_0)');

      // EVENT 2: master_lp_view_retargeting — step_0
      // Controlled by ret param + brand-config tracking.retargeting.enabled
      // ret=y → force ON | ret=n → suppress | no param → follows brand-config
      var retargetingEnabled = deepGet(brandConfig, ['tracking', 'retargeting', 'enabled'], true);
      var shouldFireRetargeting = (ret === 'y') || (ret !== 'n' && retargetingEnabled);

      if (shouldFireRetargeting) {
        window.dataLayer.push({
          event: 'master_lp_view_retargeting',
          funnel_step: 'step_0',
          conversion: conversion,
          archetype: archetype,
          angle: angle,
          ad: ad,
          phase: phase,
          eps_score: parseFloat(eps_score) || 0,
          aps_current: aps_score,
          campaign: campaign,
          banner: banner,
          publisher: publisher,
          city: city,
          region: region,
          device_type: device_type
        });
        if (debug === '1') console.log('[Echo LP] 📊 master_lp_view_retargeting fired (step_0)');
      } else {
        if (debug === '1') console.log('[Echo LP] ⏭ master_lp_view_retargeting suppressed (ret=' + ret + ')');
      }

      // ── CTA CLICK HANDLER ────────────────────────────────────
      var ctaLink = document.getElementById('cta-button');
      if (ctaLink) {
        ctaLink.addEventListener('click', function(e) {
          e.preventDefault();
          fireCTAClickEvents(this.href);
        });
      }
    }

    /* ===========================================================
       14. GTM EVENTS - CTA CLICK (Step 1)
    =========================================================== */
    function fireCTAClickEvents(destinationHref) {

      // CTA click APS bonus — fires once per session
      if (!apsData.ctaClicked) {
        apsData.ctaClickBonus = apsCfg.cta_click_bonus;
        apsData.ctaClicked = true;
      }

      var currentAPS = calculateAPS();
      setCookie('aps_score', currentAPS, cookieExpiryDays);

      // EVENT 3: echo_cta_click — step_1
      window.dataLayer.push({
        event: 'echo_cta_click',
        funnel_step: 'step_1',
        dsp_step: 'step_1',
        conversion: conversion,
        campaign: campaign,
        banner: banner,
        publisher: publisher,
        archetype: archetype,
        angle: angle,
        at: at,
        ag: ag,
        ad: ad,
        phase: phase,
        eps_score: parseFloat(eps_score) || 0,
        aps_current: currentAPS,
        eps_initial: parseFloat(eps_score) || 0,
        cta_text: document.getElementById('cta-text').textContent,
        time_on_page: Math.round((Date.now() - apsData.startTime) / 1000),
        city: city, region: region, device_type: device_type
      });

      if (debug === '1') console.log('[Echo LP] 📊 echo_cta_click fired (step_1)');

      // EVENT 4: dsp_postback — step_1
      window.dataLayer.push({
        event: 'dsp_postback',
        funnel_step: 'step_1',
        dsp_step: 'step_1',
        conversion: conversion,
        conversion_value: deepGet(brandConfig, ['conversion_values', 'step_1'], '0'),
        campaign: campaign,
        banner: banner,
        publisher: publisher,
        archetype: archetype,
        angle: angle,
        ad: ad,
        aps_current: currentAPS,
        eps_initial: parseFloat(eps_score) || 0
      });

      if (debug === '1') console.log('[Echo LP] 📊 dsp_postback fired (step_1)');

      // EVENT 5: master_lp_click_retargeting — step_1
      window.dataLayer.push({
        event: 'master_lp_click_retargeting',
        funnel_step: 'step_1',
        conversion: conversion,
        archetype: archetype,
        angle: angle,
        ad: ad,
        phase: phase,
        eps_score: parseFloat(eps_score) || 0,
        aps_current: currentAPS,
        campaign: campaign,
        banner: banner,
        publisher: publisher
      });

      if (debug === '1') {
        console.log('[Echo LP] 📊 master_lp_click_retargeting fired (step_1)');
        console.log('[Echo LP] ✅ All step_1 events fired. Opening: ' + destinationHref);
      }

      // Open conversion-tracker in new tab — approved behavior
      setTimeout(function() {
        window.open(destinationHref, '_blank', 'noopener');
      }, 150);
    }

    /* ===========================================================
       15. BOT DETECTION
    =========================================================== */
    function detectBot() {
      var isBot = false;
      if (navigator.webdriver) isBot = true;
      if (!navigator.language) isBot = true;
      if (isBot) setCookie('is_bot', '1', 1);
      return isBot;
    }

    var botDetected = detectBot();
    if (botDetected && debug === '1') console.warn('[Echo LP] ⚠️ Bot detected');

    /* ===========================================================
       16. KICKSTART
    =========================================================== */
    loadBrandConfig();

  })();
  </script>
