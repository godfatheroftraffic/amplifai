<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Thank You</title>
  <meta name="robots" content="noindex, nofollow">

  <link id="brand-font-link" rel="stylesheet" href="">

  <style>
    /* ============================================================
       ECHO THANK YOU v1.0 — STYLES
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; width: 100%; }

    body {
      font-family: var(--brand-font, 'Inter', system-ui, sans-serif);
      background: #050510;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    :root {
      --brand-font: 'Inter', system-ui, sans-serif;
      --btn-color: #2563eb;
      --accent: #7c3aed;
      --overlay-opacity: 0.65;
    }

    /* ── BACKGROUND ─────────────────────────────────────────── */
    #bg-gradient {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center top, #0d2a1a 0%, #050510 60%);
      z-index: -1;
    }

    #hero-bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    #hero-overlay {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, var(--overlay-opacity));
      z-index: 1;
    }

    .bg-orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.20; z-index: 0;
      animation: orbFloat 10s ease-in-out infinite;
    }
    .bg-orb-1 { width: 420px; height: 420px; background: var(--btn-color); top: -120px; left: -100px; animation-delay: 0s; }
    .bg-orb-2 { width: 320px; height: 320px; background: var(--btn-color); bottom: -80px; right: -80px; animation-delay: -5s; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0,0) scale(1); }
      33%       { transform: translate(18px,-18px) scale(1.04); }
      66%       { transform: translate(-14px,14px) scale(0.96); }
    }

    /* ── LAYOUT ─────────────────────────────────────────────── */
    #page-wrapper {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; min-height: 100vh;
    }

    #main-content {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center;
    }

    /* ── CARD ───────────────────────────────────────────────── */
    #ty-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 52px 44px;
      max-width: 520px; width: 100%;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* ── LOGO ───────────────────────────────────────────────── */
    #ty-logo { display: none; margin-bottom: 28px; }
    #ty-logo img { height: 44px; width: auto; object-fit: contain; opacity: 0.9; }

    /* ── CHECKMARK ──────────────────────────────────────────── */
    #check-wrap {
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 32px;
    }

    .check-circle {
      width: 88px; height: 88px; border-radius: 50%;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 0 rgba(34,197,94,0.4);
      animation: checkPulse 2.5s ease-out forwards, checkGlow 3s 0.6s ease-in-out infinite;
    }

    .check-circle svg {
      width: 44px; height: 44px;
      stroke: #fff; stroke-width: 3;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: checkDraw 0.5s 0.3s ease-out forwards;
    }

    @keyframes checkPulse {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.12); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }

    @keyframes checkGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.3); }
      50%       { box-shadow: 0 0 0 14px rgba(34,197,94,0); }
    }

    @keyframes checkDraw {
      to { stroke-dashoffset: 0; }
    }

    /* ── TEXT ───────────────────────────────────────────────── */
    #ty-title {
      font-size: 1.75rem; font-weight: 800;
      color: #ffffff; margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    #ty-subtitle {
      font-size: 1rem; color: rgba(255,255,255,0.65);
      line-height: 1.6; margin-bottom: 36px;
      max-width: 400px; margin-left: auto; margin-right: auto;
    }

    /* ── CTA BUTTON ─────────────────────────────────────────── */
    #ty-cta-wrap { margin-bottom: 28px; }

    #ty-cta-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--btn-color); color: #fff;
      font-size: 1rem; font-weight: 700;
      padding: 16px 40px; border-radius: 12px;
      text-decoration: none; cursor: pointer;
      transition: filter 0.2s, transform 0.2s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    #ty-cta-btn:hover { filter: brightness(1.12); transform: translateY(-2px); }

    /* ── REDIRECT COUNTDOWN ─────────────────────────────────── */
    #redirect-notice {
      display: none;
      font-size: 12px; color: rgba(255,255,255,0.35);
      margin-top: 8px;
    }

    #redirect-notice.active { display: block; }

    /* ── DETAILS STRIP ──────────────────────────────────────── */
    #details-strip {
      display: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 20px; margin-top: 4px;
      font-size: 12px; color: rgba(255,255,255,0.35);
      line-height: 1.8; text-align: left;
    }
    #details-strip.active { display: block; }
    #details-strip strong { color: rgba(255,255,255,0.55); }

    /* ── DEBUG ──────────────────────────────────────────────── */
    #debug-panel {
      display: none; position: fixed; top: 10px; right: 10px;
      background: rgba(0,0,0,0.92); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px; padding: 16px; font-size: 11px; color: #4ade80;
      font-family: monospace; z-index: 9999;
      max-width: 320px; max-height: 500px; overflow-y: auto; line-height: 1.6;
    }
    #debug-panel.active { display: block; }
    #debug-panel .dtitle { color: #facc15; font-weight: 700; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.1); }

    /* ── FOOTER ─────────────────────────────────────────────── */
    #page-footer {
      position: relative; z-index: 2;
      background: rgba(0,0,0,0.4);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 20px; text-align: center;
    }
    #footer-inner { max-width: 600px; margin: 0 auto; }
    #footer-logo-wrap { margin-bottom: 12px; }
    #footer-logo-wrap img { height: 36px; width: auto; opacity: 0.7; }
    #footer-social { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .social-icon { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; color: rgba(255,255,255,0.5); text-decoration: none; transition: all 0.2s; border: 1px solid transparent; }
    .social-icon:hover { color: #fff; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .social-icon svg { width: 16px; height: 16px; fill: currentColor; }
    #footer-links { display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    #footer-links a { color: rgba(255,255,255,0.35); text-decoration: none; font-size: 11px; transition: color 0.2s; }
    #footer-links a:hover { color: rgba(255,255,255,0.7); }
    #footer-links .sep { color: rgba(255,255,255,0.15); font-size: 11px; }
    #footer-copyright { font-size: 11px; color: rgba(255,255,255,0.25); }

    @media (max-width: 600px) {
      #ty-card { padding: 36px 24px; margin: 0 8px; }
      #ty-title { font-size: 1.4rem; }
      .check-circle { width: 72px; height: 72px; }
      .check-circle svg { width: 36px; height: 36px; }
    }
  </style>
</head>
<body>

  <div id="bg-gradient"></div>
  <div id="hero-bg"></div>
  <div id="hero-overlay"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div id="page-wrapper">
    <main id="main-content">
      <div id="ty-card">

        <div id="ty-logo">
          <img id="ty-logo-img" src="" alt="Brand Logo">
        </div>

        <div id="check-wrap" aria-label="Success">
          <div class="check-circle">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
        </div>

        <h1 id="ty-title">You're Confirmed!</h1>
        <p id="ty-subtitle">Thank you for taking the next step. We'll be in touch shortly.</p>

        <div id="ty-cta-wrap" style="display:none;">
          <a id="ty-cta-btn" href="#" target="_blank" rel="noopener">
            <span id="ty-cta-text">Continue</span>
            <span>→</span>
          </a>
        </div>

        <p id="redirect-notice"></p>

        <div id="details-strip"></div>

      </div><!-- /#ty-card -->
    </main>

    <footer id="page-footer">
      <div id="footer-inner">
        <div id="footer-logo-wrap" style="display:none;">
          <a id="footer-logo-link" href="#" target="_blank" rel="noopener">
            <img id="footer-logo-img" src="" alt="Brand Logo">
          </a>
        </div>
        <div id="footer-social" style="display:none;"></div>
        <nav id="footer-links" aria-label="Footer links"></nav>
        <p id="footer-copyright"></p>
      </div>
    </footer>
  </div>

  <div id="debug-panel">
    <div class="dtitle">🔍 THANK YOU v1.0 DEBUG</div>
    <div id="debug-content"></div>
  </div>

  <script>
  (function() {
    'use strict';

    function getCookie(name) {
      var nameEQ = name + '=';
      var ca = document.cookie.split(';');
      for (var i = 0; i < ca.length; i++) {
        var c = ca[i].trim();
        if (c.indexOf(nameEQ) === 0)
          return decodeURIComponent(c.substring(nameEQ.length));
      }
      return '';
    }

    var urlParams = (function() {
      var p = {};
      window.location.search.substring(1).split('&').forEach(function(pair) {
        var kv = pair.split('=');
        if (kv[0]) p[decodeURIComponent(kv[0])] = kv[1]
          ? decodeURIComponent(kv[1].replace(/\+/g, ' ')) : '';
      });
      return p;
    })();

    function getParam(primary, aliases) {
      if (urlParams[primary]) return urlParams[primary];
      if (aliases) {
        for (var i = 0; i < aliases.length; i++)
          if (urlParams[aliases[i]]) return urlParams[aliases[i]];
      }
      return getCookie(primary) || '';
    }

    function deepGet(obj, path, fallback) {
      try { return path.reduce(function(o,k){return o[k];}, obj) || fallback; }
      catch(e) { return fallback; }
    }

    var trackingData = {
      conversion:   getParam('conversion', ['trck', 'click_id', 'cid']),
      campaign:     getParam('campaign',   ['campaign_id']),
      banner:       getParam('banner',     ['creative_id', 'banner_id']),
      publisher:    getParam('publisher',  ['publisher_id']),
      offer:        getParam('offer',      ['offer_id']),
      goal_id:      getParam('goal_id',    []),
      country_name: getParam('country_name', []),
      region:       getParam('region', []),
      city:         getParam('city', []),
      device_type:  getParam('device_type', []),
      os:           getParam('os', []),
      country:      getParam('country', []),
      state:        getParam('state', []),
      zip:          getParam('zip', []),
      sub1: getParam('sub1', ['sub_id_1']),
      sub2: getParam('sub2', ['sub_id_2']),
      sub3: getParam('sub3', ['sub_id_3']),
      sub4: getParam('sub4', ['sub_id_4']),
      sub5: getParam('sub5', ['sub_id_5']),
      at:        getParam('at', ['archetype']),
      ag:        getParam('ag', ['angle']),
      ad:        getParam('ad', []),
      archetype: getParam('archetype', ['at']),
      angle:     getParam('angle', ['ag']),
      phase:     getParam('phase', []),
      av:        getParam('av', ['ad_variation']),
      mb:        getParam('mb', ['media_buyer']),
      eps_score: getParam('eps_score', ['eps']),
      aps_score: getParam('aps_score', ['aps']),
      email: getParam('email', ['e']),
      phone: getParam('phone', ['p']),
      name:  getParam('name',  ['n']),
      fname: getParam('fname', ['first_name']),
      lname: getParam('lname', ['last_name']),
      q1: getParam('q1',[]), q2: getParam('q2',[]), q3: getParam('q3',[]),
      q4: getParam('q4',[]), q5: getParam('q5',[]),
      lp_url:            getCookie('lp_url'),
      lp_referrer:       getCookie('lp_referrer'),
      lp_timestamp:      getCookie('lp_timestamp'),
      split_variant:     getCookie('split_variant'),
      final_destination: getCookie('final_destination'),
      ty_url:            window.location.href,
      ty_timestamp:      new Date().toISOString()
    };

    trackingData.archetype = trackingData.archetype || trackingData.at;
    trackingData.angle     = trackingData.angle     || trackingData.ag;

    var epsScore = parseFloat(trackingData.eps_score) || 0;
    var apsScore = 100; // CANONICAL RULE: APS forced to 100 on TY
    var debugMode = getParam('debug', []) === '1' || getParam('test_all', []) === '1';

    window.dataLayer = window.dataLayer || [];
    var brandConfig  = {};

    function getApsTierLabel(score) {
      var tiers   = deepGet(brandConfig, ['tracking', 'aps', 'quality_tiers'], {});
      var high    = typeof tiers.high     === 'number' ? tiers.high     : 80;
      var medHigh = typeof tiers.med_high === 'number' ? tiers.med_high : 65;
      var medium  = typeof tiers.medium   === 'number' ? tiers.medium   : 50;
      var medLow  = typeof tiers.med_low  === 'number' ? tiers.med_low  : 35;
      if (score >= high)    return 'high';
      if (score >= medHigh) return 'med_high';
      if (score >= medium)  return 'medium';
      if (score >= medLow)  return 'med_low';
      return 'low';
    }

    function fireConversionEvents() {
      window.dataLayer.push(Object.assign({}, trackingData, {
        event:            'thankyou_conversion',
        funnel_step:      'step_3',
        dsp_step:         'step_3',
        conversion:       trackingData.conversion,
        campaign:         trackingData.campaign,
        banner:           trackingData.banner,
        publisher:        trackingData.publisher,
        archetype:        trackingData.archetype,
        angle:            trackingData.angle,
        ad:               trackingData.ad,
        phase:            trackingData.phase,
        eps_score:        epsScore,
        aps_score:        apsScore,
        aps_current:      apsScore,
        aps_tier:         getApsTierLabel(apsScore),
        eps_initial:      epsScore,
        eps_aps_delta:    apsScore - epsScore,
        email:            trackingData.email,
        phone:            trackingData.phone,
        name:             trackingData.name || trackingData.fname,
        city:             trackingData.city,
        region:           trackingData.region,
        device_type:      trackingData.device_type,
        country:          trackingData.country,
        split_variant:    trackingData.split_variant
      }));
      if (debugMode) console.log('[TY] 📊 thankyou_conversion fired (step_3) — APS forced to 100');

      var dspEnabled = deepGet(brandConfig, ['conversion_tracker', 'dspPostback', 'enabled'], true);
      if (dspEnabled) {
        window.dataLayer.push({
          event:            'dsp_postback',
          funnel_step:      'step_3',
          dsp_step:         'step_3',
          conversion:       trackingData.conversion,
          conversion_value: deepGet(brandConfig, ['conversion_values', 'step_3'], 0),
          campaign:         trackingData.campaign,
          banner:           trackingData.banner,
          publisher:        trackingData.publisher,
          archetype:        trackingData.archetype,
          angle:            trackingData.angle,
          ad:               trackingData.ad,
          aps_current:      apsScore,
          aps_tier:         getApsTierLabel(apsScore),
          eps_initial:      epsScore
        });
        if (debugMode) console.log('[TY] 📊 dsp_postback fired (step_3)');
      }

      window.dataLayer.push({
        event:       'master_converted_retargeting',
        funnel_step: 'step_3',
        conversion:  trackingData.conversion,
        archetype:   trackingData.archetype,
        angle:       trackingData.angle,
        ad:          trackingData.ad,
        phase:       trackingData.phase,
        eps_score:   epsScore,
        aps_current: apsScore,
        aps_tier:    getApsTierLabel(apsScore),
        campaign:    trackingData.campaign,
        banner:      trackingData.banner,
        publisher:   trackingData.publisher,
        city:        trackingData.city,
        device_type: trackingData.device_type
      });
      if (debugMode) console.log('[TY] ✅ All step_3 GTM events fired');
    }

    function init() {
      fetch('./brand-config.json?v=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(config) { brandConfig = config; onConfigLoaded(config); })
        .catch(function() { brandConfig = {}; onConfigLoaded({}); });
    }

    function onConfigLoaded(config) {

      // ── GTM ──────────────────────────────────────────────────
      var gtmId = deepGet(config, ['brand', 'gtmId'], '');
      if (gtmId && gtmId !== 'GTM-XXXXXXX') {
        (function(w,d,s,l,i){
          w[l]=w[l]||[];
          w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});
          var f=d.getElementsByTagName(s)[0];
          var j=d.createElement(s);
          j.async=true;
          j.src='https://www.googletagmanager.com/gtm.js?id='+i;
          f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer',gtmId);
      }

      // ── ADKERNEL UNIVERSAL PIXEL ─────────────────────────────
      var akAccountId = deepGet(config, ['tracking', 'adkernel', 'account_id'], '');
      if (akAccountId) {
        var akPixel = document.createElement('img');
        akPixel.src = 'https://rtb2-useast.amplifai.it.com/universalPixel?account=' + encodeURIComponent(akAccountId);
        akPixel.setAttribute('style', 'width:1px;height:1px;display:none;');
        akPixel.setAttribute('referrerpolicy', 'unsafe-url');
        akPixel.alt = '';
        document.body.appendChild(akPixel);
      }

      // ── FONT ─────────────────────────────────────────────────
      var fontUrl    = deepGet(config, ['branding', 'font', 'url'], '');
      var fontFamily = deepGet(config, ['branding', 'font', 'family'], 'Inter');
      if (fontUrl) document.getElementById('brand-font-link').href = fontUrl;
      document.documentElement.style.setProperty('--brand-font', "'" + fontFamily + "', system-ui, sans-serif");
      document.body.style.fontFamily = "'" + fontFamily + "', system-ui, sans-serif";

      // ── BTN COLOR ────────────────────────────────────────────
      var btnColor = deepGet(config, ['landing_page', 'styling', 'button_color'], '#2563eb');
      document.documentElement.style.setProperty('--btn-color', btnColor);

      // ── BACKGROUND IMAGE ────────────────────────────────────
      var isMobile = window.innerWidth <= 768;
      var bgImg    = deepGet(config, ['landing_page', 'defaults', 'background_image'], '');
      var bgImgMob = deepGet(config, ['landing_page', 'defaults', 'background_image_mobile'], '');
      var heroSrc  = '';
      if (isMobile && bgImgMob) { heroSrc = 'public/' + bgImgMob; }
      else if (bgImg) { heroSrc = 'public/' + bgImg; }
      if (heroSrc) {
        var hbg = document.getElementById('hero-bg');
        if (hbg) hbg.style.backgroundImage = "url('" + heroSrc + "')";
      }
      var oMap = { light: 0.30, medium: 0.50, dark: 0.65, xdark: 0.80 };
      var oVal = deepGet(config, ['landing_page', 'defaults', 'overlay'], 'dark');
      document.documentElement.style.setProperty('--overlay-opacity', oMap[oVal] || 0.65);

      // ── LOGO ─────────────────────────────────────────────────
      var logoFile = deepGet(config, ['branding', 'logo', 'filename'], '');
      if (logoFile) {
        document.getElementById('ty-logo-img').src = 'public/' + logoFile;
        document.getElementById('ty-logo-img').alt = deepGet(config, ['branding', 'logo', 'alt'], 'Brand Logo');
        document.getElementById('ty-logo').style.display = 'block';
      }

      // ── HEADLINE / SUBHEADLINE ───────────────────────────────
      var headline = deepGet(config, ['thank_you_page', 'headline'], 'You\'re Confirmed!');
      var subhead  = deepGet(config, ['thank_you_page', 'subheadline'],
        'Thank you for taking the next step. We\'ll be in touch shortly.');
      document.getElementById('ty-title').textContent    = headline;
      document.getElementById('ty-subtitle').textContent = subhead;
      document.title = deepGet(config, ['brand', 'name'], 'AmplifAI') + ' — Step 3';

      // ── CTA BUTTON ───────────────────────────────────────────
      var ctaEnabled = deepGet(config, ['thank_you_page', 'cta', 'enabled'], false);
      var ctaUrl     = trackingData.final_destination ||
                       deepGet(config, ['thank_you_page', 'cta', 'url'], '#');
      var ctaText    = deepGet(config, ['thank_you_page', 'cta', 'text'], 'Continue');

      if (ctaEnabled && ctaUrl && ctaUrl !== '#') {
        document.getElementById('ty-cta-btn').href  = ctaUrl;
        document.getElementById('ty-cta-text').textContent = ctaText;
        document.getElementById('ty-cta-wrap').style.display = 'block';
      }

      // ── AUTO-REDIRECT ─────────────────────────────────────────
      var redirectEnabled = deepGet(config, ['thank_you_page', 'redirect', 'enabled'], false);
      var redirectUrl     = deepGet(config, ['thank_you_page', 'redirect', 'url'], '');
      var redirectDelay   = deepGet(config, ['thank_you_page', 'redirect', 'delay_seconds'], 5);

      if (redirectEnabled && redirectUrl) {
        var notice = document.getElementById('redirect-notice');
        notice.classList.add('active');
        var remaining = redirectDelay;
        notice.textContent = 'Redirecting in ' + remaining + 's...';
        var ticker = setInterval(function() {
          remaining--;
          if (remaining <= 0) {
            clearInterval(ticker);
            window.location.href = redirectUrl;
          } else {
            notice.textContent = 'Redirecting in ' + remaining + 's...';
          }
        }, 1000);
      }

      // ── FOOTER ───────────────────────────────────────────────
      buildFooter(config);

      // ── DEBUG ────────────────────────────────────────────────
      if (debugMode) {
        document.getElementById('debug-panel').classList.add('active');
        var strip = document.getElementById('details-strip');
        if (trackingData.conversion || trackingData.campaign) {
          var lines = [];
          if (trackingData.conversion) lines.push('<strong>Conversion ID:</strong> ' + trackingData.conversion);
          if (trackingData.campaign)   lines.push('<strong>Campaign:</strong> ' + trackingData.campaign);
          if (trackingData.archetype)  lines.push('<strong>Archetype:</strong> ' + trackingData.archetype);
          if (trackingData.angle)      lines.push('<strong>Angle:</strong> ' + trackingData.angle);
          lines.push('<strong>EPS:</strong> ' + epsScore + ' → <strong>APS:</strong> ' + apsScore + ' (Δ +' + (apsScore - epsScore) + ')');
          strip.innerHTML = lines.join('<br>');
          strip.classList.add('active');
        }
        var debugLines = [
          '🎯 Thank You v1.0',
          '─────────────────',
          'Conversion: ' + (trackingData.conversion || '(none)'),
          'Campaign: '   + (trackingData.campaign   || '(none)'),
          'Archetype: '  + (trackingData.archetype  || '(none)'),
          'Angle: '      + (trackingData.angle      || '(none)'),
          'Ad: '         + (trackingData.ad         || '(none)'),
          '─────────────────',
          'EPS: '        + epsScore,
          'APS: '        + apsScore + ' (forced 100)',
          'APS Tier: '   + getApsTierLabel(apsScore),
          'Delta: +'     + (apsScore - epsScore),
          '─────────────────',
          'DSP Postback: ' + (deepGet(config, ['conversion_tracker', 'dspPostback', 'enabled'], true) ? 'ON' : 'OFF'),
          'Conv Value: '   + deepGet(config, ['conversion_values', 'step_3'], 0),
          '─────────────────',
          'Email: '      + (trackingData.email || '(none)'),
          'Name: '       + (trackingData.fname || trackingData.name || '(none)'),
          'Split: '      + (trackingData.split_variant || 'n/a'),
          'Final Dest: ' + (trackingData.final_destination || 'n/a')
        ];
        document.getElementById('debug-content').innerHTML = debugLines.join('<br>');
        console.log('[TY] Config loaded:', config);
        console.log('[TY] Tracking data:', trackingData);
      }

      // ── FIRE GTM EVENTS ──────────────────────────────────────
      fireConversionEvents();
    }

        var url     = deepGet(config, ['footer', 'social_links', p, 'url'], '#');
        if (enabled && url && url !== '#') {
          hasSocial = true;
          var a = document.createElement('a');
          a.href = url; a.className = 'social-icon';
          a.target = '_blank'; a.rel = 'noopener noreferrer';
          a.setAttribute('aria-label', p.charAt(0).toUpperCase() + p.slice(1));
          a.innerHTML = socialDefs[p];
          sc.appendChild(a);
        }
      });
      if (hasSocial) sc.style.display = 'flex';

      var fl = document.getElementById('footer-links');

        return deepGet(config, ['footer', 'links', k, 'enabled'], true);
      });
      activeLinks.forEach(function(key, idx) {
        var a = document.createElement('a');
        a.href = deepGet(config, ['footer', 'links', key, 'url'], defaults[key].url);

          sep.className = 'sep'; sep.textContent = '·';

      });
